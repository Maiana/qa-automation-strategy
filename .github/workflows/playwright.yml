name: Playwright E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # daily regression run at 3am

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: e2e-playwright
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e-playwright
        run: npx playwright install --with-deps

      - name: Run Smoke Tests
        working-directory: e2e-playwright
        run: npm run test:smoke -- --project=${{ matrix.browser }} --reporter=list,html

      - name: Upload Smoke Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report-${{ matrix.browser }}
          path: e2e-playwright/playwright-report

  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: e2e-playwright
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e-playwright
        run: npx playwright install --with-deps

      - name: Run Regression Tests
        working-directory: e2e-playwright
        run: npm run test:regression -- --project=${{ matrix.browser }} --reporter=list,html

      - name: Upload Regression Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-report-${{ matrix.browser }}
          path: e2e-playwright/playwright-report
